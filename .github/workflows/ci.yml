name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  characterization-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (pinned to Render runtime)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.6"

      - name: Install dependencies (locked, reproducible)
        run: |
          python -m pip install --upgrade pip
          # Install the exact validated closure. requirements.txt holds the
          # human-editable direct pins; requirements.lock is the full transitive
          # lock the battery validated (golden 188.62 / PDF 562731 / 149 tests).
          pip install -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Run characterization suite (behaviour-preserving gate)
        env:
          PREDAIOT_AUTH_SECRET: ci-only-not-a-real-secret
        run: pytest -q
