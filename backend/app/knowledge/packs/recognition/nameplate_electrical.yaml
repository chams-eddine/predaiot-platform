  - xfmr_mva
  - transformer_rating_mva
  - transformer_capacity_mva
  - transformer_size_mva
  voltage_primary:
  - voltage_primary_v
  - voltage_primary
  - primary_voltage_v
  - primary_voltage
  - hv_voltage_v
  - primary_v
